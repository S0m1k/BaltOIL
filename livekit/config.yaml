# LiveKit server configuration for BaltOIL.
# Docs: https://docs.livekit.io/realtime/self-hosting/server-config/

port: 7880
bind_addresses:
  - ""

rtc:
  # TCP fallback (when UDP is blocked)
  tcp_port: 7881
  # UDP media port range — must match the published range in docker-compose.yml
  port_range_start: 50000
  port_range_end: 50100
  # In Docker on a public-IP server set use_external_ip: true.
  # For local dev with browser on the same host, leave false.
  # 2026-07-13: включено — на проде за docker-NAT LiveKit анонсировал внутренний
  # IP контейнера в ICE-кандидатах, и медиа не проходило.
  use_external_ip: true

# API keys: the call_service signs tokens with this same key/secret pair.
# Must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in call_service/.env.
keys:
  devkey: devsecret-change-me-in-production-min-32chars

# Webhooks: LiveKit POSTs JSON events here so we can sync call state to our DB.
webhook:
  api_key: devkey
  urls:
    - http://call_service:8006/webhook/livekit

# Logging
logging:
  level: info
  json: false

# Auto-disconnect rooms left empty for this many seconds.
room:
  empty_timeout: 120
  max_participants: 10
