services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: baltoil_auth
    ports:
      # Bind to localhost only — DB must not be reachable from LAN/internet.
      # Other services connect over the docker network, no port mapping needed.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Localhost only — no auth, must not be reachable externally.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend services: no host ports. Reachable only via the frontend TLS proxy
  # on matching ports (8001-8006, 7880). Internal docker DNS routes
  # frontend → service:port directly.

  auth_service:
    build:
      context: ./auth_service
    env_file:
      - ./auth_service/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./auth_service:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  order_service:
    build:
      context: ./order_service
    env_file:
      - ./order_service/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./order_service:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002

  delivery_service:
    build:
      context: ./delivery_service
    env_file:
      - ./delivery_service/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./delivery_service:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003

  chat_service:
    build:
      context: ./chat_service
    env_file:
      - ./chat_service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./chat_service:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      # 7880 is now TLS-terminated by frontend nginx → no host mapping here.
      - "7881:7881"                     # ICE/TCP fallback (plain, no TLS)
      - "50000-50100:50000-50100/udp"   # WebRTC media (encrypted via DTLS/SRTP)
    volumes:
      - ./livekit/config.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  call_service:
    build:
      context: ./call_service
    env_file:
      - ./call_service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - ./call_service:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006

  notification_service:
    build:
      context: ./notification_service
    env_file:
      - ./notification_service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./notification_service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005

  frontend:
    image: nginx:alpine
    # Owns every public port. nginx terminates TLS and reverse-proxies to
    # the matching backend service on the docker network.
    ports:
      - "80:80"           # redirects to 443
      - "8080:80"         # legacy bookmark → also redirects to 443
      - "443:443"
      - "8001:8001"       # auth (TLS)
      - "8002:8002"       # order (TLS)
      - "8003:8003"       # delivery (TLS)
      - "8004:8004"       # chat (TLS, WS upgrade)
      - "8005:8005"       # notification (TLS, SSE-friendly)
      - "8006:8006"       # call (TLS)
      - "7880:7880"       # livekit signalling (WSS)
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/nginx/tls:ro
    depends_on:
      - auth_service
      - order_service
      - delivery_service
      - chat_service
      - notification_service
      - call_service
      - livekit

volumes:
  postgres_data:
