<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{% endblock %}</title>
  <style>
    @page { size: A4; margin: 15mm 12mm; }
    * { box-sizing: border-box; }
    body {
      font-family: "Liberation Sans", Arial, sans-serif;
      font-size: 10pt;
      color: #000;
      margin: 0;
    }
    h1 { font-size: 13pt; text-align: left; margin: 14px 0 10px; font-weight: bold; }
    .subtitle { font-size: 10pt; color: #444; margin-bottom: 12px; }
    .warn {
      font-size: 8.5pt;
      font-style: italic;
      padding: 4px 8px;
      margin-bottom: 10px;
    }
    table { border-collapse: collapse; width: 100%; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .bold { font-weight: bold; }

    /* Шапка с банк-реквизитами в рамке */
    .bank-box { border: 1px solid #000; margin-bottom: 6px; }
    .bank-box td { border: 1px solid #000; padding: 3px 6px; font-size: 9pt; vertical-align: middle; }
    .bank-box .bank-name { font-weight: bold; }
    .bank-box .bx-label { width: 12%; text-align: left; font-size: 8.5pt; }
    .bank-box .bx-val   { width: 30%; }
    .bank-box .bx-cap   { font-size: 7.5pt; color: #555; font-style: italic; border-top: none; padding-top: 0; }
    .bank-box .bx-inn   { font-size: 9pt; }

    /* Поставщик / Покупатель / Основание */
    .party td { padding: 3px 0; vertical-align: top; font-size: 9.5pt; border: none; }
    .party .party-label { width: 18%; font-weight: bold; }
    .party .party-val { border-bottom: 1px solid #000; padding-bottom: 2px; }

    /* Товарная таблица */
    .items { margin-top: 12px; margin-bottom: 0; }
    .items th, .items td { border: 1px solid #000; padding: 4px 6px; font-size: 9pt; }
    .items th { background: #f2f2f2; font-weight: bold; text-align: center; }

    /* Итоги — справа в столбик */
    .totals { width: auto; margin-left: auto; margin-top: 4px; }
    .totals td { padding: 2px 8px; font-size: 9.5pt; border: none; }
    .totals .t-lbl { text-align: right; }
    .totals .t-val { text-align: right; min-width: 90px; border-bottom: 1px solid #000; }

    .summary { margin: 12px 0 2px; font-size: 9.5pt; }
    .words { margin: 0 0 16px; font-size: 9.5pt; border-bottom: 1px solid #000; padding-bottom: 4px; }

    /* Подписи (блок руководитель / бухгалтер / ответственный на счёте) */
    .signs { margin-top: 22px; }
    .signs td { padding: 8px 6px 2px; font-size: 9pt; vertical-align: bottom; border: none; }
    .signs .s-role  { width: 26%; font-weight: bold; }
    .signs .s-pos   { width: 26%; }
    .signs .s-name  { width: 26%; }
    .signs .s-stamp { width: 3.4cm; text-align: center; vertical-align: middle; }
    .signs .s-img   { width: 3cm; max-width: 3cm; height: auto; }
    .signs .s-fld   { border-bottom: 1px solid #000; text-align: center; font-weight: bold; min-height: 13px; padding: 0 4px; }
    .signs .s-sub   { font-size: 7pt; color: #666; text-align: center; padding-top: 1px; }

    /* legacy classes (TTN / УПД пока пользуются старой версткой) */
    .req-grid { display: flex; gap: 30px; margin-bottom: 14px; }
    .req-block { flex: 1; }
    .req-block b { display: block; margin-bottom: 3px; font-size: 10pt; }
    .req-block p { margin: 2px 0; font-size: 9.5pt; }
    .sign-area { margin-top: 30px; display: flex; justify-content: space-between; }
    .sign-item { width: 45%; }
    .sign-line { border-bottom: 1px solid #000; margin-top: 24px; }
    .sign-label { font-size: 9pt; color: #555; margin-top: 4px; }
    .footer-note { font-size: 8.5pt; color: #666; margin-top: 10px; }
    .total-row td { font-weight: bold; background: #f7f7f7; }
  </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
