org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation падает, когда pub-кэш и проект на разных дисках
# Windows (C:\Pub\Cache vs D:\...\mobile_app): RelocatableFileToPathConverter не
# умеет relative-path между разными корнями. Отключаем — на корректность не влияет.
kotlin.incremental=false
