# TLS termination + reverse proxy for all BaltOIL services.
# Backend services are reached over the internal docker network (no host ports).

# Скрыть версию nginx из заголовка Server и error-страниц.
server_tokens off;

# ── DNS resolver (docker embedded DNS at 127.0.0.11) ──
# Without this + переменная в proxy_pass, nginx резолвит upstream-имена
# один раз при старте и кэширует IP навсегда. После `docker compose up
# -d --force-recreate <svc>` сервис получает новый IP, а nginx продолжает
# стучаться на старый → 502 Bad Gateway пока не перезапустишь frontend.
# С resolver + переменной — перерезолв каждые `valid=10s`.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Rate-limit zones (defined at http context, before server blocks) ──
# login: 5 req/s burst=10 — per client IP on /auth/login
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/s;
# register: 1 req/s burst=3 — new account creation
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=1r/s;
# general API: 30 req/s burst=60 — all other API traffic
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
# WS connections: max simultaneous open connections per IP
limit_conn_zone $binary_remote_addr zone=ws_conn_zone:10m;

# ── Shared TLS settings — one cert covers every server block.
ssl_certificate     /etc/nginx/tls/cert.pem;
ssl_certificate_key /etc/nginx/tls/key.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
# Mozilla Intermediate-style: только AEAD-cipher'ы (AES-GCM, CHACHA20), без 3DES/RC4/EXPORT.
# HIGH без явных запретов оставлял рабочими 3DES/SEED — закрываем явно.
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache   shared:SSL:10m;
ssl_session_tickets off;

# WebSocket upgrade map: passes Upgrade header through.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect (port 80 inside container, mapped to host 80 and 8080) ──
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Static frontend + unified API gateway (HTTPS) ──
# All API traffic is reverse-proxied under /api/<service>/ on port 443 so the
# single self-signed cert is enough — no per-port cert-trust dance on mobile.
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;

    # Security headers (apply on every response, включая ошибки).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    # CSP как defense-in-depth. SPA построена на inline on*-обработчиках, поэтому
    # script-src вынужденно содержит 'unsafe-inline' (полное закрытие XSS требует
    # рефакторинга на addEventListener). connect-src оставлен широким (https:/wss:),
    # чтобы не сломать LiveKit-звонки. object-src/base-uri/frame-ancestors закрыты.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # ── Block internal service-to-service endpoints from public access ──
    # These routes (e.g. /internal/users-by-role, /internal/clients/:id/context)
    # are только для docker-сети. Регекс case-insensitive (?i) — не пускаем
    # обходы через /Internal/, /INTERNAL/ и т.п. $request_uri (а не $uri) —
    # ловит до URL-decode, поэтому %2finternal не пройдёт.
    location ~* "(?i)^/api/[^/]+/(api/v[0-9]+/)?internal(/|$)" {
        return 404;
    }
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") {
        return 404;
    }

    # ── Specific rate limits for auth endpoints (before the catch-all /api/auth/) ──
    # ВАЖНО: во всех proxy_pass ниже используется переменная вместо hostname.
    # Это заставляет nginx резолвить upstream через resolver (см. http context)
    # на каждый запрос, а не один раз при старте. См. DEPLOY.md gotcha №4.
    # При использовании переменной auto-strip через trailing slash в proxy_pass
    # перестаёт работать — поэтому где нужно отрезать префикс, используем rewrite.

    location = /api/auth/api/v1/auth/login {
        limit_req zone=login_zone burst=10 nodelay;
        limit_req_status 429;
        set $auth_upstream auth_service:8001;
        proxy_pass http://$auth_upstream/api/v1/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location ~ ^/api/auth/api/v1/auth/register/ {
        limit_req zone=register_zone burst=3 nodelay;
        limit_req_status 429;
        # set ДО rewrite: `rewrite ... break` останавливает дальнейшие
        # директивы rewrite-модуля, включая set. Если поставить ниже —
        # переменная окажется пустой и proxy_pass станет "http://" → 500.
        set $auth_upstream auth_service:8001;
        rewrite ^/api/auth(/.*)$ $1 break;
        proxy_pass http://$auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location = /api/auth/api/v1/auth/lookup/inn {
        limit_req zone=register_zone burst=3 nodelay;
        limit_req_status 429;
        set $auth_upstream auth_service:8001;
        rewrite ^/api/auth(/.*)$ $1 break;
        proxy_pass http://$auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 10s;
    }

    # ── Backend API gateway — strip /api/<service>/ and forward ──
    location /api/auth/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        set $auth_upstream auth_service:8001;
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://$auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location /api/order/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        set $order_upstream order_service:8002;
        rewrite ^/api/order/(.*)$ /$1 break;
        proxy_pass http://$order_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location /api/delivery/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        set $delivery_upstream delivery_service:8003;
        rewrite ^/api/delivery/(.*)$ /$1 break;
        proxy_pass http://$delivery_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # chat — includes WebSocket on /ws/<conv_id>
    location /api/chat/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        limit_conn ws_conn_zone 20;  # max 20 simultaneous connections per IP
        set $chat_upstream chat_service:8004;
        rewrite ^/api/chat/(.*)$ /$1 break;
        proxy_pass http://$chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # notifications — may stream via SSE; disable proxy buffering
    location /api/notif/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        set $notif_upstream notification_service:8005;
        rewrite ^/api/notif/(.*)$ /$1 break;
        proxy_pass http://$notif_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/call/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;
        set $call_upstream call_service:8006;
        rewrite ^/api/call/(.*)$ /$1 break;
        proxy_pass http://$call_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # LiveKit signalling WebSocket — same cert as everything else, so iOS accepts it.
    location /api/livekit/ {
        set $livekit_upstream livekit:7880;
        rewrite ^/api/livekit/(.*)$ /$1 break;
        proxy_pass http://$livekit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Backend reverse proxies (each on its own TLS port matching the original service port) ──

# auth_service
server {
    listen 8001 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    # Internal service-to-service endpoints must never be reachable via the
    # direct per-service host port (the 443 gateway has its own copy of this).
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $auth_upstream auth_service:8001;
        proxy_pass http://$auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# order_service
server {
    listen 8002 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    # Internal endpoints must never be reachable via the direct per-service host port.
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $order_upstream order_service:8002;
        proxy_pass http://$order_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# delivery_service
server {
    listen 8003 ssl;
    http2 on;
    server_name _;
    client_max_body_size 50m;
    # Internal endpoints must never be reachable via the direct per-service host port.
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $delivery_upstream delivery_service:8003;
        proxy_pass http://$delivery_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# chat_service — has WebSocket on /ws/<conv_id>
server {
    listen 8004 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    # Internal endpoints must never be reachable via the direct per-service host port.
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $chat_upstream chat_service:8004;
        proxy_pass http://$chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;  # long-lived WS
        proxy_send_timeout 3600s;
    }
}

# notification_service — may stream via SSE; disable proxy buffering
server {
    listen 8005 ssl;
    http2 on;
    server_name _;
    client_max_body_size 5m;
    # Internal endpoints must never be reachable via the direct per-service host port.
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $notif_upstream notification_service:8005;
        proxy_pass http://$notif_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}

# call_service
server {
    listen 8006 ssl;
    http2 on;
    server_name _;
    # Internal endpoints must never be reachable via the direct per-service host port.
    if ($request_uri ~* "(?i)(/|%2f)internal(/|%2f|\?|$)") { return 404; }
    location / {
        set $call_upstream call_service:8006;
        proxy_pass http://$call_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# livekit signalling (WSS)
server {
    listen 7880 ssl;
    # No http2 — livekit signalling is plain WebSocket over HTTP/1.1.
    server_name _;
    location / {
        set $livekit_upstream livekit:7880;
        proxy_pass http://$livekit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
