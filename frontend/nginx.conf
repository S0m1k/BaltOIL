# TLS termination + reverse proxy for all BaltOIL services.
# Backend services are reached over the internal docker network (no host ports).

# Shared TLS settings — one cert covers every server block.
ssl_certificate     /etc/nginx/tls/cert.pem;
ssl_certificate_key /etc/nginx/tls/key.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;

# WebSocket upgrade map: passes Upgrade header through.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect (port 80 inside container, mapped to host 80 and 8080) ──
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Static frontend (HTTPS) ──
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Backend reverse proxies (each on its own TLS port matching the original service port) ──

# auth_service
server {
    listen 8001 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    location / {
        proxy_pass http://auth_service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# order_service
server {
    listen 8002 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    location / {
        proxy_pass http://order_service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# delivery_service
server {
    listen 8003 ssl;
    http2 on;
    server_name _;
    client_max_body_size 50m;
    location / {
        proxy_pass http://delivery_service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# chat_service — has WebSocket on /ws/<conv_id>
server {
    listen 8004 ssl;
    http2 on;
    server_name _;
    client_max_body_size 20m;
    location / {
        proxy_pass http://chat_service:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;  # long-lived WS
        proxy_send_timeout 3600s;
    }
}

# notification_service — may stream via SSE; disable proxy buffering
server {
    listen 8005 ssl;
    http2 on;
    server_name _;
    client_max_body_size 5m;
    location / {
        proxy_pass http://notification_service:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}

# call_service
server {
    listen 8006 ssl;
    http2 on;
    server_name _;
    location / {
        proxy_pass http://call_service:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# livekit signalling (WSS)
server {
    listen 7880 ssl;
    # No http2 — livekit signalling is plain WebSocket over HTTP/1.1.
    server_name _;
    location / {
        proxy_pass http://livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
